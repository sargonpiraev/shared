name: Setup Node + npm ci
description: Node 22, npm cache, install dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm

    - shell: bash
      run: npm install -g npm@$(node -p "require('./package.json').devEngines.packageManager.version")

    - shell: bash
      run: npm ci
