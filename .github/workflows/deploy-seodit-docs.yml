name: deploy-seodit-docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/seodit/**'
      - 'packages/seodit/**'
      - '.github/workflows/deploy-seodit-docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-npm-ci

      - name: Build static Fumadocs site
        working-directory: docs/seodit
        env:
          DOCS_BASE_PATH: /shared/seodit
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _pages/seodit
          cp -r docs/seodit/out/* _pages/seodit/
          touch _pages/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
