name: on-push-main-seodit

on:
  push:
    branches: [main]
    paths:
      - "docs/seodit/**"
      - "packages/seodit/**"
      - "examples/seodit-next/**"
      - ".github/workflows/on-push-main-seodit.yml"
      - ".github/workflows/on-push-main.yml"

permissions:
  contents: read

concurrency:
  group: on-push-main-seodit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  base:
    uses: ./.github/workflows/on-push-main.yml

  test-next:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-npm-ci

      - name: Build seodit
        run: npm run build
        working-directory: packages/seodit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: examples/seodit-next

      - name: Next integration tests
        run: npm run test:next
        working-directory: packages/seodit
        env:
          CI: true

  publish-npm:
    needs: [base, test-next]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build
        working-directory: packages/seodit

      - name: Sync seodit release tag with npm
        working-directory: packages/seodit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="seodit-v${PKG_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          NPM_VERSION=$(npm view @sargonpiraev/seodit version 2>/dev/null || true)
          if [ -z "$NPM_VERSION" ] || [ "$NPM_VERSION" != "$PKG_VERSION" ]; then
            echo "Skip tag sync: npm=$NPM_VERSION package.json=$PKG_VERSION"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - run: npx semantic-release
        working-directory: packages/seodit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    needs: [base, test-next]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-npm-ci

      - name: Build static Fumadocs site
        working-directory: docs/seodit
        env:
          DOCS_BASE_PATH: /shared/seodit
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _pages/seodit
          cp -r docs/seodit/out/* _pages/seodit/
          touch _pages/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - uses: actions/deploy-pages@v4
        id: deployment
