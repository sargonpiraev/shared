name: on-push-main

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: on-push-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  base:
    uses: sargonpiraev/ci/.github/workflows/on-push-main.yml@main
    secrets: inherit

  test-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: sargonpiraev/ci/.github/actions/setup-node-npm-ci@main

      - name: Build seokit
        run: npm run build
        working-directory: packages/seokit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/example

      - name: Example integration tests
        run: npm run test:example
        working-directory: packages/seokit
        env:
          CI: true

  publish-npm:
    needs: [base, test-example]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build
        working-directory: packages/seokit

      - name: Sync seokit release tag with npm
        working-directory: packages/seokit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="seokit-v${PKG_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          NPM_VERSION=$(npm view @sargonpiraev/seokit version 2>/dev/null || true)
          if [ -z "$NPM_VERSION" ] || [ "$NPM_VERSION" != "$PKG_VERSION" ]; then
            echo "Skip tag sync: npm=$NPM_VERSION package.json=$PKG_VERSION"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - run: npx semantic-release
        working-directory: packages/seokit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docs:
    needs: [base, test-example]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: sargonpiraev/ci/.github/actions/setup-node-npm-ci@main

      - name: Build static Fumadocs site
        working-directory: apps/docs
        env:
          DOCS_BASE_PATH: /seokit
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          mkdir -p _pages
          cp -r apps/docs/out/* _pages/
          touch _pages/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - uses: actions/deploy-pages@v4
        id: deployment
